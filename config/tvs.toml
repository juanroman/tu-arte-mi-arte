# TVs conocidas de la casa (PRD §7.6, §7.10). La MAC es la clave estable —
# la IP la asigna DHCP y puede cambiar (observado en vivo 2026-07-08: Frame
# 50 se movió de .103 a .104 sin aviso). last_known_ip es solo una caché para
# evitar el costo de un browse mDNS en el caso común; engine.tv_discovery la
# mantiene al día sola vía resolve_tv_host(), así que puede quedar en blanco
# o desactualizada sin romper nada — se autocorrige.

[tvs."43L"]
mac = "AA:BB:CC:DD:EE:01"
last_known_ip = "192.168.1.101"

[tvs."43R"]
mac = "AA:BB:CC:DD:EE:02"
last_known_ip = "192.168.1.102"

[tvs."50"]
mac = "AA:BB:CC:DD:EE:03"
last_known_ip = "192.168.1.104"
